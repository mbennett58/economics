<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PED Calculator - Economics Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #content { margin-left: 280px; padding: 40px; } /* Matches your sidebar width */
        .calc-box { max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<main id="content">
    <h2>Price Elasticity of Demand (PED) Calculator</h2>
    <p class="text-muted">Enter the changes in Price and Quantity to see the elasticity.</p>

    <div class="calc-box">
        <div class="mb-3">
            <label class="form-label">% Change in Quantity Demanded</label>
            <input type="number" id="deltaQ" class="form-control" placeholder="e.g. -10">
        </div>
        <div class="mb-3">
            <label class="form-label">% Change in Price</label>
            <input type="number" id="deltaP" class="form-control" placeholder="e.g. 5">
        </div>
        <button onclick="calculatePED()" class="btn btn-primary w-100">Calculate</button>

        <div id="result" class="mt-4 p-3 d-none rounded text-center">
            <h4 id="pedValue"></h4>
            <p id="pedType" class="fw-bold"></p>
        </div>
    </div>
</main>

<script>
    // 1. Load the sidebar
    fetch('../sidebar.html') // Notice the ../ because this file is in a subfolder
        .then(res => res.text())
        .then(data => document.getElementById('sidebar-container').innerHTML = data);

    // 2. PED Logic
    function calculatePED() {
        const dQ = document.getElementById('deltaQ').value;
        const dP = document.getElementById('deltaP').value;
        const resultDiv = document.getElementById('result');

        if (dQ && dP) {
            const ped = Math.abs(dQ / dP);
            let type = "";
            let color = "";

            if (ped > 1) { type = "Elastic"; color = "alert-success"; }
            else if (ped < 1) { type = "Inelastic"; color = "alert-warning"; }
            else { type = "Unitary"; color = "alert-info"; }

            document.getElementById('pedValue').innerText = "PED = " + ped.toFixed(2);
            document.getElementById('pedType').innerText = "This good is " + type;
            resultDiv.className = "mt-4 p-3 rounded text-center alert " + color;
            resultDiv.classList.remove('d-none');
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
